<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ANBI Tech Solution</title>
<link rel="stylesheet" href="assets/css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
.login-container { min-height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg, #0a1628 0%, #1a365d 100%); position:relative; overflow:hidden; }
.login-container::before { content:''; position:absolute; inset:0; background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
.login-card { background:#fff; padding:40px; border-radius:20px; width:100%; max-width:420px; box-shadow:0 25px 50px rgba(0,0,0,0.3); position:relative; z-index:1; }
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo i { font-size:52px; color:#0057FF; }
.login-logo h2 { margin-top:12px; color:#0a1628; font-size:22px; font-weight:700; }
.login-logo p { color:#64748B; font-size:13px; margin-top:4px; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; margin-bottom:6px; font-size:13px; font-weight:500; color:#0a1628; }
.form-group input { width:100%; padding:13px 16px; border:1px solid #e2e8f0; border-radius:10px; font-size:14px; font-family:'Poppins',sans-serif; transition:all 0.3s; }
.form-group input:focus { border-color:#0057FF; outline:none; box-shadow:0 0 0 3px rgba(0,87,255,0.1); }
.form-group input::placeholder { color:#94a3b8; }
.btn-login { width:100%; padding:14px; background:linear-gradient(135deg,#0057FF,#00C2FF); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s; font-family:'Poppins',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,87,255,0.3); }
.btn-login:disabled { opacity:0.7; cursor:not-allowed; transform:none; }
.login-footer { text-align:center; margin-top:24px; font-size:13px; color:#64748B; }
.login-footer a { color:#0057FF; text-decoration:none; font-weight:500; }
.login-footer a:hover { text-decoration:underline; }
.alert { padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:13px; display:none; }
.alert-error { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
.alert-success { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0; }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.forgot-link { text-align:right; margin-top:-10px; margin-bottom:16px; }
.forgot-link a { font-size:12px; color:#0057FF; text-decoration:none; }
.forgot-link a:hover { text-decoration:underline; }
</style>
<style>
.logo-img { height: 40px; width: auto; display: block; }
.footer-logo .logo-img { height: 36px; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
       <img src="assets/logo1.png" alt="login Logo" class="logo-img" 
       style="height:40px; width:auto; margin:0 auto; display:block;">
      
      <h2>ANBI Tech Solution</h2>
      <p>Staff Login Portal</p>
    </div>

    <div id="loginAlert" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-envelope" style="margin-right:6px;color:#0057FF;"></i>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock" style="margin-right:6px;color:#0057FF;"></i>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="login-footer">
      <p><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a></p>
      <p style="margin-top:10px;">Need help? Contact <a href="mailto:anbitechsolutions@gmail.com">anbitechsolutions@gmail.com</a></p>
      <p style="margin-top:6px;"><i class="fas fa-phone" style="margin-right:4px;"></i> +977-9763381611</p>
    </div>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const alert = document.getElementById('loginAlert');
  const btn = document.getElementById('loginBtn');

  alert.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  try {
    const API_BASE = (() => {
      const hostname = location.hostname;
      if (hostname === 'anbi-tech.onrender.com') return '/api';
      return 'https://anbi-tech.onrender.com/api';
    })();
    const res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success && data.token) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      alert.className = 'alert alert-success';
      alert.textContent = 'Login successful! Redirecting...';
      alert.style.display = 'block';

      // Backend returns redirectTo based on user role
      setTimeout(() => window.location.href = data.redirectTo, 800);
    } else {
      alert.className = 'alert alert-error';
      if (res.status === 503) {
        alert.textContent = data.message || 'Server database is not connected. Please check MongoDB configuration.';
      } else if (res.status === 404) {
        alert.textContent = 'API not found. Is the backend server running?';
      } else {
        alert.textContent = data.message || 'Invalid email or password';
      }
      alert.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
  } catch (err) {
    let msg = 'Network error. Please check your connection and try again.';
    if (err.name === 'TypeError' && err.message.includes('fetch')) {
      msg = 'Cannot connect to server. Make sure the backend is running at the correct URL.';
    }
    alert.className = 'alert alert-error';
    alert.textContent = msg;
    alert.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
  }
});
</script>
</body>
</html>
