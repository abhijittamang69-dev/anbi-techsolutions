services:
  - type: web
    name: anbi-tech-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false      # Set manually in Render Dashboard with your real MongoDB URI
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: anbitechsolutions@gmail.com
      - key: SMTP_PASS
        sync: false      # Set manually in Render Dashboard (Gmail App Password)
      - key: ADMIN_EMAIL
        value: anbitechsolutions@gmail.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false      # Set manually in Render Dashboard
      - key: CLOUDINARY_API_KEY
        sync: false      # Set manually in Render Dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false      # Set manually in Render Dashboard
      - key: FRONTEND_URL
        value: https://anbi-tech.onrender.com
      - key: RENDER_EXTERNAL_URL
        sync: false      # Auto-populated by Render
